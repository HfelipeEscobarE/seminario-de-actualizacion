<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="styles.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <tr><td colspan="4"><input type="text" class="pantalla" value="0" readonly></td></tr>
        <tr><td><button class="azul btn">7</button></td><td><button class="azul btn">8</button></td><td><button class="azul btn">9</button></td><td><button class="verde btn">+</button></td></tr>
        <tr><td><button class="azul btn">4</button></td><td><button class="azul btn">5</button></td><td><button class="azul btn">6</button></td><td><button class="verde btn">-</button></td></tr>
        <tr><td><button class="azul btn">1</button></td><td><button class="azul btn">2</button></td><td><button class="azul btn">3</button></td><td><button class="verde btn">*</button></td></tr>
        <tr><td><button class="azul btn">0</button></td><td><button class="azul btn">.</button></td><td><button class="amarillo btn">=</button></td><td><button class="verde btn">/</button></td></tr>
        <tr><td colspan="4"><button class="vestimenta-boton-borrar btn">Borrar</button></td></tr>
    </table>
    <script src="script.js"></script>
</body>
</html>
